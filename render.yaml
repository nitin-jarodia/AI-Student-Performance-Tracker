# Render Blueprint — backend API + managed PostgreSQL (free tier).
# Frontend stays on Vercel; set VITE_API_URL there to the Render API URL.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: ai-student-tracker-db
    databaseName: ai_student_tracker
    user: ai_student_tracker
    plan: free

services:
  - type: web
    name: ai-student-tracker-api
    runtime: python
    plan: free
    rootDir: AI-Student-Performance-Tracker-main/ai-student-tracker-v2/backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-student-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: SEED_DEFAULT_ADMIN
        value: "false"
      - key: BOOTSTRAP_DEMO_LOGIN
        value: "true"
      - key: SKIP_AUTO_MIGRATE
        value: "1"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: "none"
      - key: DEBUG
        value: "false"
      - key: FRONTEND_BASE_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_SCAN_BASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
