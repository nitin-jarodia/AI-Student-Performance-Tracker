repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        files: ^backend/
        args: [--fix]
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint frontend
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/src/
        pass_filenames: false
