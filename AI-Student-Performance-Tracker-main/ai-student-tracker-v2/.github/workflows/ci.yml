name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_student_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_student_tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_student_tracker_test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_student_tracker_test
          SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          SEED_DEFAULT_ADMIN: "true"
          BOOTSTRAP_DEMO_LOGIN: "false"
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=50

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests

  alembic-fresh:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_student_tracker_migrate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_student_tracker_migrate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"

      - name: Migrate empty database from scratch
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_student_tracker_migrate
          SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
        run: |
          pip install -r requirements.txt
          alembic upgrade head

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, lint, and unit test frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test:unit

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8000
          VITE_SHOW_DEMO_CREDENTIALS: "true"
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_student_tracker_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_student_tracker_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"

      - name: Start API
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_student_tracker_e2e
          SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          SEED_DEFAULT_ADMIN: "true"
          BOOTSTRAP_DEMO_LOGIN: "false"
        run: |
          pip install -r requirements.txt
          alembic upgrade head
          python -c "from app.scripts.bootstrap_users import ensure_demo_admin; ensure_demo_admin(email='demo@school.com', password='demo', force_reset_password=True)"
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/ready && break
            sleep 2
          done

      - name: Set up Node and run Playwright
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8000
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npm run build
          npm run preview -- --host 127.0.0.1 --port 4173 &
          sleep 3
          npm run test:e2e

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, alembic-fresh]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: ai-student-tracker-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          build-args: VITE_API_URL=http://127.0.0.1:8000
          tags: ai-student-tracker-frontend:ci
