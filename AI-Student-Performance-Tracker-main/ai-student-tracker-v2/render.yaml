# Render Blueprint — deploy API + static frontend + managed Postgres.
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy, set FRONTEND_BASE_URL / APP_URL / VITE_API_URL to your public URLs.

databases:
  - name: ai-student-tracker-db
    databaseName: ai_student_tracker
    user: ai_student_tracker
    plan: free

services:
  - type: web
    name: ai-student-tracker-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-student-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SEED_DEFAULT_ADMIN
        value: "false"
      - key: SKIP_AUTO_MIGRATE
        value: "1"
      - key: COOKIE_SECURE
        value: "true"
      - key: DEBUG
        value: "false"
      - key: FRONTEND_BASE_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false

  - type: web
    name: ai-student-tracker-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
